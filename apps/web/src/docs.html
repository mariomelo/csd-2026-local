<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Engine Documentation</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .docs-container {
            max-width: 900px;
            margin: 50px auto;
            padding: 40px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .docs-header {
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #667eea;
        }

        .docs-header h1 {
            margin: 0 0 10px 0;
            color: #333;
        }

        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: #667eea;
            text-decoration: none;
            font-weight: bold;
        }

        .back-link:hover {
            text-decoration: underline;
        }

        .feature-doc {
            margin-bottom: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
            border-left: 4px solid #667eea;
        }

        .feature-doc h2 {
            margin: 0 0 15px 0;
            color: #667eea;
        }

        .feature-doc h3 {
            margin: 15px 0 10px 0;
            color: #333;
            font-size: 1.1rem;
        }

        .feature-doc p {
            margin: 10px 0;
            color: #555;
            line-height: 1.6;
        }

        .code-block {
            background: #2d2d2d;
            color: #f8f8f2;
            padding: 15px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
            overflow-x: auto;
            margin: 10px 0;
        }

        .field-name {
            color: #667eea;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            background: #f0f0f0;
            padding: 2px 6px;
            border-radius: 3px;
        }

        .no-features {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .no-features p {
            font-size: 1.1rem;
            margin-bottom: 20px;
        }

        .admin-link {
            display: inline-block;
            padding: 12px 24px;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            transition: background 0.3s;
        }

        .admin-link:hover {
            background: #5568d3;
        }
    </style>
</head>
<body style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh;">
    <div class="docs-container">
        <a href="./" class="back-link">← Back to Game</a>

        <div class="docs-header">
            <h1>Game Engine Documentation</h1>
            <p>Required fields and values for enabled features</p>
        </div>

        <div id="docs-content">
            <p style="text-align: center; color: #666;">Loading...</p>
        </div>
    </div>

    <script src="docs.js"></script>
</body>
</html>
