name: CI/CD

on:
  push:
    branches: [main]
  pull_request:

# Permite o deploy no GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Um deploy por vez; não cancela um deploy em andamento
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # ---------- CI: testes (TDD + BDD) ----------
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Unit tests (TDD / jest)
        run: npm test

      - name: BDD tests (cucumber)
        run: npm run test:bdd

  # ---------- CD: build + deploy da web no GitHub Pages ----------
  deploy:
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build web (static)
        run: npm run build:web

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
